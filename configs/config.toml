# LTE Scanner default configuration.
# All runtime values live here so that no setting is hardcoded in source.

[device]
# Index of the RTL-SDR device to use. 0 = first dongle.
index = 0

[scan]
# Default band to scan when --band is not provided.
default_band = 8
# Default central frequency in MHz (informational, used for display).
default_frequency_mhz = 869.5
# RF gain in dB. 40-49 recommended for RTL-SDR R820T.
gain_db = 42.0
# Per-scan timeout in seconds.
timeout_seconds = 30
# Number of retries when srsRAN exits without producing cells.
retry_count = 2
# Bands permitted when --band is omitted. Empty list = caller chooses.
allowed_bands = []

[output]
# One of: table, json, csv, yaml
format = "table"
# Directory where exported scans are written.
export_dir = "./exports"

[logging]
# One of: DEBUG, INFO, WARNING, ERROR
level = "INFO"
# Path to log file. Empty string = log to stderr only.
file = ""

[srsran]
# Path to the srsRAN cell_search binary.
binary_path = "/home/pi/srsRAN_4G/build/lib/examples/cell_search"